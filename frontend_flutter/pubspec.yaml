name: frontend_flutter
description: "眼科医疗知识问答系统 - Flutter 移动端"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.6.3

  # 网络
  dio: ^5.7.0

  # 本地存储
  shared_preferences: ^2.3.3
  sqflite: ^2.4.1
  path: ^1.9.0

  # Markdown 渲染
  flutter_markdown: ^0.7.4
  markdown: ^7.2.2

  # 语音输入
  speech_to_text: ^7.0.0

  # 生物识别
  local_auth: ^2.3.0

  # 分享 & 截图
  share_plus: ^10.1.4
  screenshot: ^3.0.0

  # 图片缓存
  cached_network_image: ^3.4.1

  # 临时目录（分享图片用）
  path_provider: ^2.1.5

  # App 版本信息
  package_info_plus: ^8.1.2

  # 图标
  flutter_svg: ^2.0.16

  # 时间格式化
  intl: ^0.19.0

  # 代码高亮（配合 flutter_markdown）
  flutter_highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
