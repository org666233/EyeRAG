[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Coverage
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    unit: 单元测试（不依赖外部服务）
    integration: 集成测试（依赖数据库/ChromaDB）
    stress: 压力/性能测试（需服务运行）
    llm: 需要调用LLM的测试
    no_llm: 不调用LLM的测试
    slow: 运行较慢的测试

# Filterwarnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
